<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide Philippe — Discover restaurants worth remembering</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ───────────────────────────────────────────── */
    :root {
      --c-bg:         oklch(97.5% 0.008 78);
      --c-ink:        oklch(13%  0.012 255);
      --c-gold:       oklch(58%  0.070 72);
      --c-gold-light: oklch(91%  0.032 76);
      --c-gold-mid:   oklch(72%  0.050 74);
      --c-burg:       oklch(31%  0.080 17);
      --c-burg-light: oklch(93%  0.016 17);
      --c-n50:        oklch(95.5% 0.006 78);
      --c-n100:       oklch(92%  0.007 78);
      --c-n200:       oklch(86%  0.008 78);
      --c-n300:       oklch(76%  0.008 78);
      --c-n400:       oklch(63%  0.007 78);
      --c-n500:       oklch(52%  0.007 78);
      --c-n600:       oklch(41%  0.007 78);
      --c-n700:       oklch(30%  0.008 78);
      --f-display: 'Cormorant Garamond', Georgia, serif;
      --f-body:    'DM Sans', system-ui, sans-serif;
      --r-sm: 4px; --r-md: 8px; --r-lg: 14px; --r-xl: 20px; --r-pill: 9999px;
      --s-sm: 0 1px 4px oklch(0% 0 0/.06), 0 1px 2px oklch(0% 0 0/.04);
      --s-md: 0 4px 16px oklch(0% 0 0/.08), 0 2px 4px oklch(0% 0 0/.04);
      --s-lg: 0 16px 40px oklch(0% 0 0/.10), 0 4px 8px oklch(0% 0 0/.05);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── RESET ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--c-bg); color: var(--c-ink); font-family: var(--f-body);
           -webkit-font-smoothing: antialiased; text-wrap: pretty; }
    button { font-family: var(--f-body); cursor: pointer; }
    a { text-decoration: none; color: inherit; }

    /* ── HEADER ───────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 200;
      background: oklch(97.5% 0.008 78 / 0.92);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid transparent;
      transition: border-color .3s, box-shadow .3s;
    }
    .header.lifted { border-color: var(--c-n100); box-shadow: var(--s-sm); }

    .header-inner {
      max-width: 1240px; margin: 0 auto;
      padding: 0 40px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      font-family: var(--f-display);
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em;
      color: var(--c-ink); text-decoration: none;
    }
    .logo-accent { color: var(--c-burg); }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .icon-btn {
      width: 40px; height: 40px;
      border: none; border-radius: var(--r-pill); background: transparent;
      color: var(--c-n500); display: flex; align-items: center; justify-content: center;
      transition: background .18s, color .18s;
    }
    .icon-btn:hover { background: var(--c-n100); color: var(--c-ink); }

    .btn-login {
      font-size: .8125rem; font-weight: 500; letter-spacing: .03em;
      padding: 8px 20px; border-radius: var(--r-md);
      border: 1px solid var(--c-n200); background: white; color: var(--c-ink);
      transition: background .2s var(--ease), color .2s, border-color .2s;
    }
    .btn-login:hover { background: var(--c-ink); color: var(--c-bg); border-color: var(--c-ink); }

    /* ── HERO ─────────────────────────────────────────────── */
    .hero {
      position: relative; overflow: hidden;
      padding: 72px 40px 68px; text-align: center;
      background: linear-gradient(175deg,
        oklch(90% 0.024 17) 0%,
        oklch(95% 0.014 17) 38%,
        var(--c-bg) 100%);
    }

    .hero-wm {
      position: absolute; left: 50%; top: 52%;
      transform: translate(-50%, -50%);
      font-family: var(--f-display); font-size: 38vw; font-weight: 700;
      letter-spacing: -0.05em; line-height: 1;
      color: oklch(31% 0.080 17 / .055); pointer-events: none; user-select: none;
      white-space: nowrap;
    }

    .hero-inner { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }

    /* Brand headline */
    .hero-brandname {
      font-family: var(--f-display);
      font-weight: 700; line-height: .86; letter-spacing: -0.04em;
      margin-bottom: 22px;
      opacity: 0; animation: up .85s var(--ease) .05s forwards;
    }
    .hero-brand-guide {
      display: block;
      font-size: clamp(3rem, 6vw, 5.2rem);
      font-weight: 300; color: var(--c-n600); letter-spacing: -0.02em;
    }
    .hero-brand-philippe {
      display: block;
      font-size: clamp(5.5rem, 12vw, 10.5rem);
      color: var(--c-burg); line-height: .82;
    }

    .hero-tagline {
      font-family: var(--f-display);
      font-size: 1.15rem; font-weight: 300; font-style: italic;
      color: oklch(38% 0.040 17); margin-bottom: 44px;
      opacity: 0; animation: up .8s var(--ease) .25s forwards;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Search bar */
    .search-wrap {
      margin-bottom: 18px;
      opacity: 0; animation: up .8s var(--ease) .35s forwards;
    }

    .search-bar {
      display: flex; align-items: center;
      background: white; border: 1.5px solid var(--c-n200);
      border-radius: var(--r-pill); padding: 5px 5px 5px 20px;
      box-shadow: var(--s-md);
      transition: border-color .2s, box-shadow .2s;
    }
    .search-bar:focus-within {
      border-color: var(--c-gold);
      box-shadow: 0 0 0 3px var(--c-gold-light), var(--s-md);
    }

    .search-ic { color: var(--c-n400); flex-shrink: 0; margin-right: 10px; }

    .search-input {
      flex: 1; border: none; background: transparent; outline: none;
      font-family: var(--f-body); font-size: 1rem; color: var(--c-ink); min-width: 0;
    }
    .search-input::placeholder { color: var(--c-n300); }

    .search-btn {
      font-size: .875rem; font-weight: 500; letter-spacing: .03em;
      padding: 10px 24px; border: none;
      border-radius: var(--r-pill); background: var(--c-burg); color: white;
      transition: background .2s var(--ease);
      flex-shrink: 0;
    }
    .search-btn:hover { background: oklch(26% .080 17); }

    /* Filter chips */
    .filters {
      display: flex; align-items: center; justify-content: center;
      gap: 7px; flex-wrap: wrap;
      opacity: 0; animation: up .8s var(--ease) .45s forwards;
    }

    .filter-label {
      font-size: 10px; font-weight: 500; letter-spacing: .12em;
      text-transform: uppercase; color: var(--c-n400);
      padding: 0 4px;
    }

    .fsep { width: 1px; height: 18px; background: var(--c-n200); margin: 0 2px; }

    .chip {
      font-size: 12px; font-weight: 500; letter-spacing: .03em;
      padding: 6px 14px; border-radius: var(--r-pill);
      border: 1px solid var(--c-n200); background: white; color: var(--c-n600);
      transition: all .18s var(--ease); white-space: nowrap;
    }
    .chip:hover { border-color: var(--c-n400); color: var(--c-ink); }
    .chip.is-on  { background: var(--c-burg); border-color: var(--c-burg); color: white; }
    .chip.is-on.gold { background: var(--c-gold-light); border-color: var(--c-gold); color: oklch(38% .065 72); }

    /* ── CONTENT ──────────────────────────────────────────── */
    .content { max-width: 1240px; margin: 0 auto; padding: 56px 40px 80px; }

    .row-block { margin-bottom: 60px; }

    .row-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 22px;
    }

    .row-title-group { display: flex; align-items: baseline; gap: 12px; }

    .row-title {
      font-family: var(--f-display);
      font-size: 2rem; font-weight: 600; letter-spacing: -0.015em; line-height: 1;
    }

    .row-sub {
      font-size: 11px; font-weight: 500; letter-spacing: .14em;
      text-transform: uppercase; color: var(--c-burg);
    }

    .see-all {
      font-size: 12px; font-weight: 500; letter-spacing: .05em;
      color: var(--c-gold); cursor: pointer;
      transition: color .15s;
    }
    .see-all:hover { color: oklch(44% .070 72); }

    /* Scroll track with right-fade */
    .scroll-track-wrap { position: relative; }

    .scroll-track-wrap::after {
      content: ''; position: absolute; top: 0; right: 0; bottom: 12px;
      width: 72px; pointer-events: none; z-index: 2;
      background: linear-gradient(to right, transparent, var(--c-bg));
    }

    .scroll-track {
      display: flex; gap: 16px;
      overflow-x: auto; padding-bottom: 14px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
    }
    .scroll-track::-webkit-scrollbar { display: none; }

    /* ── CARD ─────────────────────────────────────────────── */
    .card {
      flex-shrink: 0; width: 236px;
      background: white; border-radius: var(--r-lg);
      border: 1px solid var(--c-n100); box-shadow: var(--s-sm);
      overflow: hidden; cursor: pointer;
      transition: box-shadow .25s var(--ease), transform .25s var(--ease);
      scroll-snap-align: start;
    }
    .card:hover { box-shadow: var(--s-lg); transform: translateY(-4px);
                  border-top-color: var(--c-burg); }

    /* Placeholder image */
    .card-img {
      width: 100%; aspect-ratio: 3/2;
      position: relative; overflow: hidden;
      background: repeating-linear-gradient(
        -45deg,
        var(--c-n100), var(--c-n100) 1px,
        var(--c-n50)  1px, var(--c-n50)  14px
      );
      display: flex; align-items: center; justify-content: center;
    }

    .card-img-lbl {
      font-size: 10px; color: var(--c-n300);
      font-family: 'SF Mono','Fira Code',monospace; letter-spacing: .05em;
    }

    .card-pill {
      position: absolute; bottom: 10px; right: 10px;
      background: white; border-radius: var(--r-sm);
      padding: 4px 8px; font-size: 15px; line-height: 1;
      box-shadow: var(--s-sm);
    }

    .card-body { padding: 14px 16px 18px; }

    .card-name {
      font-family: var(--f-display);
      font-size: 1.175rem; font-weight: 600; line-height: 1.2;
      color: var(--c-ink); margin-bottom: 4px;
    }

    .card-cuisine {
      font-size: 10px; font-weight: 500; letter-spacing: .13em;
      text-transform: uppercase; color: var(--c-gold);
      margin-bottom: 14px;
    }

    .card-foot {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid var(--c-n100);
    }

    .card-price { font-size: 13px; font-weight: 500; letter-spacing: .02em; }
    .pon  { color: var(--c-ink); }
    .poff { color: var(--c-n200); }

    .card-rating {
      font-size: 11px; color: var(--c-n400);
      display: flex; align-items: center; gap: 4px;
    }
    .rating-emoji { font-size: 13px; }

    /* ── DIVIDER ──────────────────────────────────────────── */
    .ornament {
      display: flex; align-items: center; gap: 18px;
      margin: 0 0 60px;
    }
    .ornament-line { flex: 1; height: 1px; background: var(--c-n100); }
    .ornament-dot  { width: 4px; height: 4px; border-radius: 50%; background: var(--c-gold); flex-shrink: 0; }
    .ornament-text {
      font-family: var(--f-display); font-size: .875rem; font-style: italic;
      color: var(--c-n400); white-space: nowrap; letter-spacing: .04em;
    }

    /* ── FOOTER ───────────────────────────────────────────── */
    .footer {
      background: var(--c-burg);
      padding: 36px 40px;
    }
    .footer-inner {
      max-width: 1240px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-logo {
      font-family: var(--f-display); font-size: 1.5rem; font-weight: 700;
      letter-spacing: -0.02em; color: oklch(90% 0.018 17);
    }
    .footer-logo .logo-accent { color: white; }
    .footer-links { display: flex; gap: 28px; }
    .footer-link { font-size: 12px; color: oklch(72% 0.024 17); letter-spacing: .04em; transition: color .15s; text-decoration: none; }
    .footer-link:hover { color: white; }
    .footer-copy { font-size: 11px; color: oklch(60% 0.020 17); letter-spacing: .03em; }

    /* ── RESPONSIVE ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .header-inner { padding: 0 20px; height: 56px; }
      .logo          { font-size: 1.25rem; }

      .hero          { padding: 60px 20px 56px; }
      .hero-wm       { font-size: 56vw; }
      .hero-tagline  { font-size: 1rem; margin-bottom: 32px; }
      .hero-brand-guide { font-size: clamp(2.4rem, 5vw, 3rem); }
      .hero-brand-philippe { font-size: clamp(4.5rem, 11vw, 6rem); }

      .filters {
        flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start;
        padding-bottom: 6px; scrollbar-width: none;
      }
      .filters::-webkit-scrollbar { display: none; }
      .filter-label { display: none; }

      .content { padding: 40px 20px 60px; }
      .row-title { font-size: 1.6rem; }

      .card { width: 196px; }
      .card-name { font-size: 1.05rem; }

      .footer { padding: 28px 20px; }
      .footer-links { display: none; }
    }

    @media (max-width: 480px) {
      .hero-sub { display: none; }
      .search-btn span { display: none; }
      .search-btn { padding: 10px 14px; }
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<header class="header" id="hdr">
  <div class="header-inner">
    <a class="logo" href="#">Guide <span class="logo-accent">Philippe</span></a>
    <div class="header-right">
      <button class="icon-btn" aria-label="Search" id="hdr-search-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
      </button>
      <button class="btn-login">Login</button>
    </div>
  </div>
</header>

<!-- ══ HERO ════════════════════════════════════════════════ -->
<section class="hero">
  <div class="hero-wm" aria-hidden="true">GP</div>
  <div class="hero-inner">

    <h1 class="hero-brandname">
      <span class="hero-brand-guide">Guide</span>
      <span class="hero-brand-philippe">Philippe</span>
    </h1>

    <p class="hero-tagline">An honest, curated guide to exceptional dining.</p>

    <!-- Search bar -->
    <div class="search-wrap">
      <div class="search-bar">
        <svg class="search-ic" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input class="search-input" id="q" type="text"
               placeholder="Restaurant, cuisine or city…" autocomplete="off">
        <button class="search-btn" onclick="doSearch()">
          <span>Search</span>
        </button>
      </div>
    </div>

    <!-- Filter chips -->
    <div class="filters" id="filters">
      <!-- Cuisine -->
      <span class="filter-label">Cuisine</span>
      <button class="chip is-on"  data-g="cuisine" data-v="all">All</button>
      <button class="chip"        data-g="cuisine" data-v="french">French</button>
      <button class="chip"        data-g="cuisine" data-v="italian">Italian</button>
      <button class="chip"        data-g="cuisine" data-v="japanese">Japanese</button>
      <button class="chip"        data-g="cuisine" data-v="med">Mediterranean</button>

      <div class="fsep"></div>

      <!-- Price -->
      <span class="filter-label">Price</span>
      <button class="chip" data-g="price" data-v="1">€</button>
      <button class="chip" data-g="price" data-v="2">€€</button>
      <button class="chip" data-g="price" data-v="3">€€€</button>
      <button class="chip" data-g="price" data-v="4">€€€€</button>

      <div class="fsep"></div>

      <!-- Spoon rating -->
      <span class="filter-label">Spoons</span>
      <button class="chip" data-g="rating" data-v="4" title="Absolute Recommendation">🍽️</button>
      <button class="chip" data-g="rating" data-v="3" title="Worth Mentioning">🍴</button>
      <button class="chip" data-g="rating" data-v="2" title="Remembering">🥄</button>
      <button class="chip" data-g="rating" data-v="1" title="Not Recommended">🫗</button>
    </div>

  </div>
</section>

<!-- ══ MAIN CONTENT ═════════════════════════════════════════ -->
<main class="content">

  <!-- Neueste Einträge -->
  <div class="row-block">
    <div class="row-head">
      <div class="row-title-group">
        <h2 class="row-title">Neueste Einträge</h2>
        <span class="row-sub">Latest Entries</span>
      </div>
      <a class="see-all">See all &nbsp;→</a>
    </div>
    <div class="scroll-track-wrap">
      <div class="scroll-track" id="row-latest"></div>
    </div>
  </div>

  <!-- Ornament divider -->
  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-dot"></div>
    <div class="ornament-text">Editors' Selection</div>
    <div class="ornament-dot"></div>
    <div class="ornament-line"></div>
  </div>

  <!-- Top Rated -->
  <div class="row-block">
    <div class="row-head">
      <div class="row-title-group">
        <h2 class="row-title">Top Rated</h2>
        <span class="row-sub">Guide Philippe Picks</span>
      </div>
      <a class="see-all">See all &nbsp;→</a>
    </div>
    <div class="scroll-track-wrap">
      <div class="scroll-track" id="row-top"></div>
    </div>
  </div>

</main>

<!-- ══ FOOTER ══════════════════════════════════════════════ -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">Guide <span class="logo-accent" style="color:var(--c-burg)">Philippe</span>.</div>
    <nav class="footer-links">
      <a class="footer-link" href="#">About</a>
      <a class="footer-link" href="#">Cities</a>
      <a class="footer-link" href="#">Cuisines</a>
      <a class="footer-link" href="#">Contact</a>
    </nav>
    <span class="footer-copy">© 2026 Guide Philippe</span>
  </div>
</footer>

<script>
  /* ── Scroll → lift header ── */
  const hdr = document.getElementById('hdr');
  window.addEventListener('scroll', () => {
    hdr.classList.toggle('lifted', window.scrollY > 10);
  }, { passive: true });

  /* ── Header search button scrolls to hero input ── */
  document.getElementById('hdr-search-btn').addEventListener('click', () => {
    document.getElementById('q').focus({ preventScroll: false });
    document.getElementById('q').scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  /* ── Filter chips ── */
  document.getElementById('filters').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    const g = chip.dataset.g;
    const v = chip.dataset.v;

    if (g === 'cuisine') {
      // radio — only one active
      document.querySelectorAll('[data-g="cuisine"]').forEach(c => c.classList.remove('is-on'));
      chip.classList.add('is-on');
    } else {
      // toggle for price + rating
      chip.classList.toggle('is-on');
    }
  });

  /* ── Search ── */
  function doSearch() {
    const q = document.getElementById('q').value.trim();
    if (q) console.log('Search:', q); // hook to backend
  }
  document.getElementById('q').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  /* ── Restaurant data ── */
  const RATINGS = {
    4: { emoji: '🍽️', label: 'Absolute Recommendation' },
    3: { emoji: '🍴', label: 'Worth Mentioning' },
    2: { emoji: '🥄', label: 'Remembering' },
    1: { emoji: '🫗', label: 'Not Recommended' },
  };

  const latest = [
    { name: 'Le Jardin Blanc',   cuisine: 'French · Bistro',        price: 3, r: 3, loc: 'Paris'      },
    { name: 'Sushi Kato',        cuisine: 'Japanese · Omakase',     price: 4, r: 4, loc: 'Tokyo'      },
    { name: 'Trattoria Forno',   cuisine: 'Italian · Roman',        price: 2, r: 2, loc: 'Rome'       },
    { name: 'Brasserie Nord',    cuisine: 'French · Brasserie',     price: 2, r: 3, loc: 'Lyon'       },
    { name: 'El Cielo',          cuisine: 'Spanish · Modern',       price: 3, r: 4, loc: 'Barcelona'  },
    { name: 'Chez Marie',        cuisine: 'French · Café',          price: 1, r: 2, loc: 'Paris'      },
    { name: 'Casa Mia',          cuisine: 'Italian · Seafood',      price: 3, r: 3, loc: 'Palermo'    },
    { name: 'Sakura',            cuisine: 'Japanese · Sushi',       price: 3, r: 4, loc: 'Osaka'      },
  ];

  const topRated = [
    { name: 'Restaurant Lumière',cuisine: 'French · Gastronomie',  price: 4, r: 4, loc: 'Paris'      },
    { name: 'Atelier Nishi',     cuisine: 'Japanese · Kaiseki',    price: 4, r: 4, loc: 'Kyoto'      },
    { name: 'Osteria Bella',     cuisine: 'Italian · Trattoria',   price: 2, r: 3, loc: 'Florence'   },
    { name: "La Maison d'Or",    cuisine: 'French · Fine Dining',  price: 4, r: 4, loc: 'Paris'      },
    { name: 'Garden Kitchen',    cuisine: 'Mediterranean · Seasonal',price: 2,r: 3, loc: 'Athens'    },
    { name: 'Noma',              cuisine: 'Nordic · Fermentation', price: 4, r: 4, loc: 'Copenhagen' },
    { name: 'Septime',           cuisine: 'Bistro · Natural Wine', price: 2, r: 3, loc: 'Paris'      },
    { name: 'Den',               cuisine: 'Japanese · Modern',     price: 4, r: 4, loc: 'Tokyo'      },
  ];

  function price(n) {
    return [1,2,3,4].map(i =>
      `<span class="${i <= n ? 'pon' : 'poff'}">€</span>`
    ).join('');
  }

  function card(d) {
    const rt = RATINGS[d.r];
    return `
      <article class="card" role="button" tabindex="0" aria-label="${d.name}">
        <div class="card-img">
          <span class="card-img-lbl">${d.loc}</span>
          <div class="card-pill" title="${rt.label}">${rt.emoji}</div>
        </div>
        <div class="card-body">
          <div class="card-name">${d.name}</div>
          <div class="card-cuisine">${d.cuisine}</div>
          <div class="card-foot">
            <div class="card-price">${price(d.price)}</div>
            <div class="card-rating">
              <span class="rating-emoji">${rt.emoji}</span>
            </div>
          </div>
        </div>
      </article>`;
  }

  document.getElementById('row-latest').innerHTML = latest.map(card).join('');
  document.getElementById('row-top').innerHTML    = topRated.map(card).join('');
</script>
</body>
</html>
