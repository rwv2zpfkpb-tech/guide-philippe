<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#5c2a28" />
    <title>Offline · Guide Philippe</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f4ee;
        color: #211d1c;
      }
      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding:
          max(24px, env(safe-area-inset-top))
          max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom))
          max(24px, env(safe-area-inset-left));
        box-sizing: border-box;
        text-align: center;
      }
      main { max-width: 30rem; }
      .mark {
        width: 4.5rem;
        height: 4.5rem;
        margin: 0 auto 1.5rem;
        border-radius: 1.25rem;
        display: grid;
        place-items: center;
        background: #5c2a28;
        color: #f7f4ee;
        font-family: Georgia, serif;
        font-size: 1.7rem;
        font-weight: 700;
        box-shadow: 0 12px 36px rgb(92 42 40 / 20%);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-family: Georgia, serif;
        font-size: clamp(2rem, 10vw, 3rem);
        line-height: 1;
        color: #5c2a28;
      }
      p { margin: 0 0 1.5rem; color: #665d59; line-height: 1.55; }
      .retry {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        min-height: 3rem;
        padding: 0.75rem 1.25rem;
        border: 0;
        border-radius: 999px;
        background: #5c2a28;
        color: white;
        font: inherit;
        font-weight: 650;
        text-decoration: none;
      }
      @media (prefers-color-scheme: dark) {
        :root { background: #211818; color: #f2ece8; }
        h1 { color: #d69792; }
        p { color: #c2b6af; }
        .mark, .retry { background: #9e5753; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">GP</div>
      <h1>Gerade offline</h1>
      <p>
        Guide Philippe konnte keine Verbindung herstellen. Sobald du wieder online bist,
        kannst du direkt weitermachen.
      </p>
      <a class="retry" href="/">Erneut versuchen</a>
    </main>
  </body>
</html>
